<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tahvil Raporları</title>
<style>
  html, body { height: 100%; margin: 0; font-family: -apple-system, Helvetica, Arial, sans-serif; }
  body { display: flex; flex-direction: column; }
  #sekmeler { display: flex; gap: 6px; padding: 10px 12px; background: #f2f2f2; border-bottom: 1px solid #ddd; }
  .sekme { flex: 1; padding: 12px 8px; border: none; border-radius: 8px; background: #fff; color: #111; font-size: 0.95em; cursor: pointer; }
  .sekme.aktif { background: #111; color: #fff; }
  a.sekme { display: flex; align-items: center; justify-content: center; text-decoration: none; background: #1a7a3a; color: #fff; }
  iframe { flex: 1; width: 100%; border: none; }
</style>
</head>
<body>
<div id="sekmeler">
  <button class="sekme aktif" data-src="verim_egrisi.html">Tahvil raporu</button>
  <button class="sekme" data-src="tlref_fiyat.html">TLREF raporu</button>
  <button class="sekme" data-src="altin_fiyat.html">Altın raporu</button>
  <button class="sekme" data-src="tufe_reel.html">TÜFE raporu</button>
  <a class="sekme" href="fon_getirileri.xlsx" download="Fon Getirileri.xlsx">Fon Getirileri (Excel) ⬇</a>
</div>
<iframe id="rapor" src="verim_egrisi.html"></iframe>
<script>
  document.querySelectorAll('.sekme').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sekme').forEach(b => b.classList.remove('aktif'));
      btn.classList.add('aktif');
      document.getElementById('rapor').src = btn.dataset.src;
    });
  });
</script>
</body>
</html>
